<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Klinika · DICOM lightbox</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  :root { --r-pill: 999px; }
  html, body {
    height: 100%;
    background: #0c0a09;
    overflow: hidden;
  }
  body {
    color: white;
    font-family: var(--font-ui);
    position: relative;
  }

  .dl-stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
  }

  .dl-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    z-index: 3;
  }
  .dl-meta { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.4; }
  .dl-meta .pt { color: white; font-weight: 500; font-size: 13px; }
  .dl-meta .dt {
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }
  .dl-tools { display: flex; align-items: center; gap: 8px; }
  .dl-tools .btn-icon {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.08);
    border: 1px solid transparent;
    color: rgba(255,255,255,0.85);
    border-radius: var(--r-md);
    display: grid; place-items: center;
    transition: background 120ms ease;
    cursor: pointer;
  }
  .dl-tools .btn-icon:hover { background: rgba(255,255,255,0.16); }
  .zoom-toggle {
    display: flex;
    background: rgba(255,255,255,0.08);
    border-radius: var(--r-md);
    overflow: hidden;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .zoom-toggle button {
    padding: 9px 14px;
    color: rgba(255,255,255,0.65);
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    transition: background 120ms ease;
  }
  .zoom-toggle button.active {
    background: rgba(255,255,255,0.18);
    color: white;
    font-weight: 600;
  }

  .dl-image {
    width: min(70vw, 70vh);
    aspect-ratio: 1 / 1;
    transition: transform 200ms cubic-bezier(.2,.7,.3,1);
  }
  body[data-zoom="2"] .dl-image { transform: scale(2); }

  .dl-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 48px; height: 48px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.85);
    display: grid; place-items: center;
    cursor: pointer;
    transition: background 120ms ease;
    z-index: 3;
  }
  .dl-arrow:hover { background: rgba(255,255,255,0.18); }
  .dl-arrow.left  { left: 24px; }
  .dl-arrow.right { right: 24px; }
  .dl-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  body[data-count="1"] .dl-arrow { display: none; }

  .dl-bot {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 22px;
    background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, transparent 100%);
    z-index: 3;
  }
  .dl-counter {
    font-family: var(--font-mono);
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    font-variant-numeric: tabular-nums;
    padding: 6px 14px;
    background: rgba(255,255,255,0.08);
    border-radius: var(--r-pill);
  }
  .dl-counter .total { color: rgba(255,255,255,0.5); }

  /* Variant switcher */
  .variant-switcher {
    position: fixed;
    top: 70px; right: 22px;
    z-index: 4;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--r-md);
    padding: 3px;
    display: flex;
    gap: 2px;
  }
  .variant-switcher button {
    padding: 5px 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    border-radius: var(--r-sm);
    transition: all 120ms ease;
    font-family: var(--font-mono);
    background: transparent;
    border: none;
    cursor: pointer;
  }
  .variant-switcher button.active {
    background: rgba(255,255,255,0.18);
    color: white;
    font-weight: 600;
  }
</style>
</head>
<body data-zoom="1" data-count="8" data-i="3">

<div class="variant-switcher" aria-label="Variant">
  <button class="active" onclick="setCount(8)">Multi (8)</button>
  <button onclick="setCount(1)">Single (1)</button>
</div>

<div class="dl-top">
  <div class="dl-meta">
    <div class="pt">Era Krasniqi</div>
    <div class="dt">Vizita e 14.05.2026 · Ultrazeri abdominal</div>
  </div>
  <div class="dl-tools">
    <div class="zoom-toggle" aria-label="Zoom">
      <button class="active" onclick="setZoom(1, this)">1×</button>
      <button onclick="setZoom(2, this)">2×</button>
    </div>
    <button class="btn-icon" aria-label="Mbyll (Esc)" onclick="window.close()" title="Mbyll (Esc)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>
    </button>
  </div>
</div>

<button class="dl-arrow left" aria-label="I mëparshmi (←)" onclick="step(-1)">
  <svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 3L5 9l6 6"/></svg>
</button>

<div class="dl-stage">
  <svg class="dl-image" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
    <rect width="100" height="100" fill="#0c0a09"/>
    <path d="M 50 5 L 90 95 L 10 95 Z" fill="#1c1917"/>
    <path d="M 50 20 L 78 88 L 22 88 Z" fill="#292524"/>
    <ellipse cx="50" cy="65" rx="14" ry="9" fill="#44403c"/>
    <ellipse cx="46" cy="62" rx="4" ry="3" fill="#78716c"/>
    <path d="M 24 88 Q 50 86 76 88" stroke="rgba(120,113,108,0.4)" stroke-width="0.3" fill="none"/>
  </svg>
</div>

<button class="dl-arrow right" aria-label="I tjetri (→)" onclick="step(1)">
  <svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 3l6 6-6 6"/></svg>
</button>

<div class="dl-bot">
  <span class="dl-counter"><span id="cur">3</span> <span class="total">/ <span id="tot">8</span></span></span>
</div>

<script>
  function setZoom(z, btn) {
    document.body.dataset.zoom = String(z);
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  function setCount(n) {
    document.body.dataset.count = String(n);
    document.body.dataset.i = n === 1 ? '1' : '3';
    document.getElementById('tot').textContent = n;
    document.getElementById('cur').textContent = document.body.dataset.i;
    document.querySelectorAll('.variant-switcher button').forEach(b => b.classList.remove('active'));
    [...document.querySelectorAll('.variant-switcher button')]
      .find(b => b.getAttribute('onclick').includes(`(${n})`))
      ?.classList.add('active');
  }
  function step(d) {
    const n = +document.body.dataset.count;
    if (n <= 1) return;
    let i = +document.body.dataset.i + d;
    if (i < 1) i = n;
    if (i > n) i = 1;
    document.body.dataset.i = String(i);
    document.getElementById('cur').textContent = i;
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  step(-1);
    if (e.key === 'ArrowRight') step(1);
    if (e.key === 'Escape')     window.close();
    if (e.key === '1')          setZoom(1, document.querySelector('.zoom-toggle button:first-child'));
    if (e.key === '2')          setZoom(2, document.querySelector('.zoom-toggle button:last-child'));
  });
</script>

</body>
</html>
