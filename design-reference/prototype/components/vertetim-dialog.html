<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Klinika · Lësho vërtetim absencë</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  :root { --r-pill: 999px; }
  body {
    min-height: 100vh;
    background: var(--bg);
    display: grid;
    place-items: center;
    padding: 40px 24px;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(28,25,23,0.38);
    backdrop-filter: blur(3px);
    z-index: 1;
  }

  .vrt-modal {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 540px;
    background: var(--bg-elevated);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-modal);
    overflow: hidden;
    border: 1px solid var(--border);
    animation: modal-in 200ms cubic-bezier(.2,.7,.3,1);
  }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(8px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .vrt-modal > header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
  }
  .vrt-modal > header h3 { font-size: 16px; font-weight: 600; }
  .vrt-modal > header .sub { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }

  .vrt-body {
    padding: 16px 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .pt-header {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .pt-header .pt-name {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .pt-header .pt-meta {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .pt-header .pt-meta .sep { color: var(--border-strong); }
  .pt-header .ro-pill {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--text-faint);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 3px;
  }

  .range-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 16px minmax(0, 1fr);
    gap: 10px;
    align-items: end;
  }
  .range-row .field { min-width: 0; }
  .range-row .input { min-width: 0; }
  .range-row .arrow {
    color: var(--text-faint);
    text-align: center;
    font-size: 14px;
    padding-bottom: 8px;
  }
  .input.err {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(185,28,28,0.12);
  }
  .err-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--red);
    margin-top: 8px;
  }

  .quick-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .quick-chips .chip {
    cursor: pointer;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--r-pill);
    transition: all 120ms ease;
    font-family: var(--font-ui);
  }
  .quick-chips .chip:hover { color: var(--text); background: var(--bg-subtle); }
  .quick-chips .chip.active {
    background: var(--primary-soft);
    border-color: var(--teal-300);
    color: var(--teal-800);
    font-weight: 500;
  }

  .preview-card {
    background: var(--primary-tint);
    border: 1px solid var(--teal-200);
    border-radius: var(--r-md);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: opacity 150ms ease;
  }
  .preview-card.invalid { opacity: 0.55; background: var(--bg-subtle); border-color: var(--border); }
  .preview-card .pv-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 14px;
  }
  .preview-card .pv-lab {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--teal-800);
    font-weight: 600;
  }
  .preview-card.invalid .pv-lab { color: var(--text-faint); }
  .preview-card .pv-val {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-strong);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .preview-card.invalid .pv-val { color: var(--text-faint); font-weight: 500; }
  .preview-card .pv-val .dim { color: var(--text-muted); font-weight: 500; margin-left: 4px; }
  .preview-card .pv-dx {
    font-size: 12.5px;
    color: var(--text);
    padding-top: 6px;
    border-top: 1px solid var(--teal-200);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-card.invalid .pv-dx { color: var(--text-faint); border-top-color: var(--border); }
  .preview-card .pv-dx .dx-code {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg-elevated);
    color: var(--teal-800);
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid var(--teal-200);
  }
  .preview-card.invalid .pv-dx .dx-code { color: var(--text-muted); border-color: var(--border); }

  .vrt-modal > footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg-subtle);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
</style>
</head>
<body>

<div class="vrt-modal" role="dialog" aria-labelledby="vrtTitle">
  <header>
    <h3 id="vrtTitle">Lësho vërtetim absencë</h3>
    <div class="sub">Vërtetimi printohet bashkë me diagnozën aktuale të vizitës.</div>
  </header>

  <div class="vrt-body">
    <div class="pt-header">
      <div>
        <div class="pt-name">Era Krasniqi</div>
        <div class="pt-meta">
          <span>2 vjeç 9 muaj</span><span class="sep">·</span>
          <span>F</span><span class="sep">·</span>
          <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">PR-23-0142</span>
        </div>
      </div>
      <span class="ro-pill">Vetëm-lexim</span>
    </div>

    <div>
      <div class="field-label" style="margin-bottom: 6px;">Periudha e mungesës</div>
      <div class="range-row">
        <div class="field">
          <label class="field-label" style="font-size: 11px; color: var(--text-faint);">Nga</label>
          <input class="input" id="dFrom" type="date" value="2026-05-14">
        </div>
        <div class="arrow">→</div>
        <div class="field">
          <label class="field-label" style="font-size: 11px; color: var(--text-faint);" id="toLabel">Deri</label>
          <input class="input" id="dTo" type="date" value="2026-05-18">
        </div>
      </div>
      <div class="err-line" id="errLine" hidden>
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="5.5"/><path d="M7 4v3.5M7 9.6v.01"/>
        </svg>
        Data "Deri" duhet të jetë e barabartë ose pas datës "Nga".
      </div>
      <div class="quick-chips" role="group" aria-label="Periudha të zakonshme">
        <button type="button" class="chip" data-days="1">Sot</button>
        <button type="button" class="chip" data-days="3">3 ditë</button>
        <button type="button" class="chip active" data-days="5">5 ditë</button>
        <button type="button" class="chip" data-days="7">1 javë</button>
        <button type="button" class="chip" data-days="10">10 ditë</button>
      </div>
    </div>

    <div class="preview-card" id="preview">
      <div class="pv-row">
        <span class="pv-lab">Periudha</span>
        <span class="pv-val" id="pvText">14.05.2026 — 18.05.2026 <span class="dim">· 5 ditë</span></span>
      </div>
      <div class="pv-dx">
        <span class="dx-code">J03.9</span>
        Tonsillopharyngitis acuta
      </div>
    </div>
  </div>

  <footer>
    <button class="btn btn-ghost" onclick="window.close()">Anulo</button>
    <button class="btn btn-secondary" id="btnView">Shiko vërtetimin</button>
    <button class="btn btn-primary"   id="btnPrint">Printo vërtetimin</button>
  </footer>
</div>

<script>
  const $from = document.getElementById('dFrom');
  const $to   = document.getElementById('dTo');
  const $pv   = document.getElementById('preview');
  const $pvTx = document.getElementById('pvText');
  const $err  = document.getElementById('errLine');
  const $toL  = document.getElementById('toLabel');
  const $bv   = document.getElementById('btnView');
  const $bp   = document.getElementById('btnPrint');

  function fmt(d) {
    const dt = new Date(d + 'T00:00:00');
    const pad = (n) => String(n).padStart(2, '0');
    return `${pad(dt.getDate())}.${pad(dt.getMonth() + 1)}.${dt.getFullYear()}`;
  }
  function diffDays(a, b) {
    const A = new Date(a + 'T00:00:00').getTime();
    const B = new Date(b + 'T00:00:00').getTime();
    return Math.floor((B - A) / (1000 * 60 * 60 * 24)) + 1;
  }

  function refresh() {
    const f = $from.value, t = $to.value;
    const valid = f && t && new Date(t) >= new Date(f);
    $err.hidden = valid;
    $to.classList.toggle('err', !valid);
    $toL.style.color = valid ? 'var(--text-faint)' : 'var(--red)';
    $pv.classList.toggle('invalid', !valid);
    $bv.disabled = !valid;
    $bp.disabled = !valid;
    if (valid) {
      const d = diffDays(f, t);
      $pvTx.innerHTML = `${fmt(f)} — ${fmt(t)} <span class="dim">· ${d} ditë</span>`;
    } else {
      $pvTx.textContent = '— periudhë e pavlefshme —';
    }
    // sync chips with current diff
    if (valid) {
      const d = diffDays(f, t);
      document.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('active', +c.dataset.days === d);
      });
    } else {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    }
  }

  function applyDays(n) {
    const f = $from.value || '2026-05-14';
    const start = new Date(f + 'T00:00:00');
    const end = new Date(start.getTime() + (n - 1) * 86400000);
    const iso = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    $to.value = iso(end);
    refresh();
  }

  $from.addEventListener('change', refresh);
  $to.addEventListener('change', refresh);
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => applyDays(+c.dataset.days));
  });
  $bp.addEventListener('click', () => window.open('../print-certificate.html', '_blank'));
  $bv.addEventListener('click', () => window.open('../print-certificate.html', '_blank'));

  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.close(); });

  refresh();
</script>

</body>
</html>
