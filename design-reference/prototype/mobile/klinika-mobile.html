<style>
  /* Frame-local toast (absolute within the device screen, not the viewport,
     so it stays inside the scaled bezel). */
  .m-frame-toast {
    position: absolute;
    left: 50%; bottom: calc(var(--m-tabbar-h) + 18px);
    transform: translateX(-50%) translateY(16px);
    background: var(--text-strong);
    color: #fff;
    padding: 11px 16px;
    border-radius: var(--r-md);
    font-size: 13.5px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    transition: all 240ms cubic-bezier(.22,.61,.36,1);
    pointer-events: none;
    z-index: 70;
    white-space: nowrap;
    max-width: 86%;
  }
  .m-frame-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .m-frame-toast .check {
    width: 18px; height: 18px; flex-shrink: 0;
    background: var(--teal-400); color: var(--teal-900);
    border-radius: 999px; display: grid; place-items: center; font-size: 11px;
  }
  .device.is-tablet .m-frame-toast { bottom: 28px; }
</style>
</head>
