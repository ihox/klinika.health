<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Klinika · DonetaMED — Hyr</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<style>
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    padding: 40px 24px;
  }

  /* Clinic identity stripe — soft teal, no admin gradient */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--primary);
    z-index: 100;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
  }

  /* Platform brand-row — mirrors the pattern in prototype/index.html
     so logged-out users see the same klinika.health lockup whether they
     land on the platform login or a clinic-scoped login. The clinic
     identity sits below in its own section. */
  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand-row .word {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-strong);
  }
  .brand-row .word .ext { color: var(--text-faint); font-weight: 400; }

  /* Clinic header — logo placeholder + clinic name. Different from the
     platform-admin pill: we lead with the clinic, not the platform. */
  .clinic-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-xs);
    margin-bottom: 28px;
  }
  .clinic-logo {
    width: 44px; height: 44px;
    border-radius: var(--r-md);
    background: var(--primary-soft);
    border: 1px solid var(--teal-200);
    color: var(--teal-800);
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .clinic-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .clinic-name {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-strong);
    letter-spacing: -0.015em;
  }
  .clinic-sub {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .clinic-sub .sep { color: var(--border-strong); }
  .clinic-sub code {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  .login-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.025em;
    margin-bottom: 4px;
  }
  .login-sub {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .login-form { display: flex; flex-direction: column; gap: 14px; }

  .row-between { display: flex; justify-content: space-between; align-items: center; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }
  .checkbox-row input { accent-color: var(--primary); width: 14px; height: 14px; }

  .link-muted { font-size: 13px; color: var(--primary); font-weight: 500; }
  .link-muted:hover { color: var(--primary-dark); text-decoration: underline; }

  .role-switch {
    margin-top: 4px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }
  .role-btn {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: var(--r-sm);
    text-align: center;
    transition: all 150ms ease;
  }
  .role-btn:hover { color: var(--text); }
  .role-btn.active {
    background: var(--bg-elevated);
    color: var(--text-strong);
    box-shadow: var(--shadow-xs);
  }

  .login-footer {
    margin-top: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .login-footer a { color: var(--text-muted); }
  .login-footer a:hover { color: var(--primary); }
  .shield-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .shield-row svg { color: var(--primary); }
</style>
</head>
<body>

<div class="login-card">
  <!-- Platform brand — same lockup as the platform login. -->
  <div class="brand-row">
    <span class="brand-mark" style="width:40px;height:40px;border-radius:11px" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg></span>
    <span class="word">klinika<span class="ext">.health</span></span>
  </div>

  <!-- Clinic identity header (logo placeholder + name) -->
  <div class="clinic-head">
    <div class="clinic-logo" aria-hidden="true">DM</div>
    <div class="clinic-meta">
      <div class="clinic-name">DonetaMED</div>
      <div class="clinic-sub">
        <span>Ambulanca Pediatrike</span>
        <span class="sep">·</span>
        <code>donetamed.klinika.health</code>
      </div>
    </div>
  </div>

  <div class="login-title">Mirë se erdhët</div>
  <div class="login-sub">Hyni në llogarinë tuaj për të vazhduar.</div>

  <form class="login-form" onsubmit="event.preventDefault(); goToRole();">
    <div class="field">
      <label class="field-label" for="email">Email</label>
      <input class="input" id="email" type="email" value="taulant@donetamed.com" autocomplete="username">
    </div>

    <div class="field">
      <label class="field-label" for="pwd">Fjalëkalimi</label>
      <input class="input" id="pwd" type="password" value="••••••••••" autocomplete="current-password">
    </div>

    <div class="row-between">
      <label class="checkbox-row">
        <input type="checkbox" checked>
        Më mbaj të kyçur
      </label>
      <a class="link-muted" href="password-reset.html">Harruat fjalëkalimin?</a>
    </div>

    <div class="role-switch" role="tablist" aria-label="Roli i hyrjes">
      <button type="button" class="role-btn active" data-role="doctor" onclick="setRole(this)">Mjeku</button>
      <button type="button" class="role-btn" data-role="reception" onclick="setRole(this)">Recepsioni</button>
    </div>

    <button class="btn btn-primary btn-lg" type="submit" style="margin-top: 6px;">Hyr</button>
  </form>

  <div class="login-footer">
    <a href="../website/index.html">← klinika.health</a>
    <div class="shield-row">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M8 2L3 4v4c0 3 2.5 5.5 5 6.5 2.5-1 5-3.5 5-6.5V4L8 2z"/>
      </svg>
      Mbrojtur me MFA
    </div>
  </div>
</div>

<script>
  let currentRole = 'doctor';
  function setRole(btn) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRole = btn.dataset.role;
  }
  function goToRole() {
    window.location.href = currentRole === 'reception' ? 'receptionist.html' : 'doctor.html';
  }
</script>

</body>
</html>
