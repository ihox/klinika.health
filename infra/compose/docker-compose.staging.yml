# Klinika staging stack — runs on the shared Proxmox VM at
# /srv/sites/klinika-health/. Mirrors the tregu-online / montelgo
# convention: image refs point at GHCR, CI builds + pushes, the
# VM-side /usr/local/bin/deploy.sh `compose pulls` + restarts.
#
# This file is the canonical version under version control. An
# identical copy lives at /srv/sites/klinika-health/docker-compose.yml
# on the VM and is fed by the `.env` file in that same directory
# (gitignored, secrets only). When this file changes meaningfully,
# sync the VM copy by hand — there is no auto-sync step in CI.
# See infra/STAGING.md + ADR-018.

name: klinika-staging

services:
  postgres:
    image: postgres:16-alpine
    container_name: klinika-staging-postgres
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      PGTZ: Europe/Belgrade
      POSTGRES_DB: ${POSTGRES_DB:-klinika}
      POSTGRES_USER: ${POSTGRES_USER:-klinika}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klinika} -d ${POSTGRES_DB:-klinika}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/ihox/klinika-api:staging
    container_name: klinika-staging-api
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Europe/Belgrade
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-klinika}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-klinika}?schema=public
      STORAGE_ROOT: /workspace/storage
    volumes:
      - ./storage:/workspace/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - public

  web:
    image: ghcr.io/ihox/klinika-web:staging
    container_name: klinika-staging-web
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Europe/Belgrade
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
    depends_on:
      - api
    networks:
      - public
    ports:
      - "8003:3000"

networks:
  internal:
    name: klinika-staging-internal
    driver: bridge
  public:
    name: klinika-staging-public
    driver: bridge
