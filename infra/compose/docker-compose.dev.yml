# Local development stack for Klinika.
# Run from the repo root with: make dev (passes --project-directory .),
# so every relative path here resolves against the repo root, not this
# file's directory. Don't switch them back to `../..`.
#
# All services run TZ=Europe/Belgrade per ADR-006.

name: klinika

services:
  postgres:
    image: postgres:16-alpine
    container_name: klinika-postgres
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      PGTZ: Europe/Belgrade
      POSTGRES_DB: ${POSTGRES_DB:-klinika}
      POSTGRES_USER: ${POSTGRES_USER:-klinika}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-klinika}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klinika} -d ${POSTGRES_DB:-klinika}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: klinika-api
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      NODE_ENV: development
      API_PORT: 3001
      API_HOST: 0.0.0.0
      # Hardcoded: inside the docker network the postgres service is
      # reached as `postgres:5432`. Host-side commands (make db-migrate,
      # make db-seed, host pnpm test) use a different DATABASE_URL via
      # the Makefile / root .env that points at `localhost:5432`.
      DATABASE_URL: postgresql://klinika:klinika@postgres:5432/klinika?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Email transport (see .env / .env.example for the full selection
      # order). Forwarded from the host .env so a developer can switch
      # between SMTP / Resend / capturing-stdout without editing compose.
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@klinika.health}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Klinika}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/workspace/apps/api
      - api-node-modules:/workspace/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: klinika-web
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      NODE_ENV: development
      # Browser talks to the same host as the page; Next.js rewrites
      # /api/* and /health/* to API_INTERNAL_URL server-side. Avoids
      # CORS / cross-host cookie issues on *.localhost subdomains.
      NEXT_PUBLIC_API_URL: ""
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./design-reference:/workspace/design-reference
      - web-node-modules:/workspace/apps/web/node_modules
      - web-next-cache:/workspace/apps/web/.next
    depends_on:
      - api

  # Orthanc — DICOM C-STORE receiver + REST API.
  # See infra/compose/orthanc/orthanc.json for the runtime config:
  #   - REST API behind HTTP basic auth (admin creds from .env)
  #   - DICOM AET klinika-orthanc; remote-AET allowlist enforced
  #   - On every received study, Orthanc fires the webhook to
  #     POST http://api:3001/api/dicom/internal/orthanc-event so the
  #     bridge can index it in the dicom_studies table.
  # The storage volume mounts to /var/lib/orthanc/db in dev. In
  # production (infra/compose/docker-compose.onprem.yml) it bind-mounts
  # /mnt/dicom-storage on the clinic's 2TB HDD.
  orthanc:
    image: orthancteam/orthanc:24.7.3
    container_name: klinika-orthanc
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-klinika}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:-klinika}
      ORTHANC_WEBHOOK_URL: ${ORTHANC_WEBHOOK_URL:-http://api:3001/api/dicom/internal/orthanc-event}
      ORTHANC_WEBHOOK_SECRET: ${ORTHANC_WEBHOOK_SECRET:-klinika-webhook-dev}
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./infra/compose/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./infra/compose/orthanc/on-stored.lua:/etc/orthanc/on-stored.lua:ro

volumes:
  postgres-data:
  orthanc-data:
  api-node-modules:
  web-node-modules:
  web-next-cache:
