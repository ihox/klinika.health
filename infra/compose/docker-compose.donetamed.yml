# Klinika DonetaMED on-prem stack — runs on the clinic laptop at
# /srv/sites/klinika-health/. Mirrors the staging compose
# (infra/compose/docker-compose.staging.yml) with three intentional
# differences:
#
#   1. Tenancy runs in SUFFIX mode (CLINIC_HOST_SUFFIX=.klinika.health),
#      matching production. No CLINIC_HOST_APEX / CLINIC_HOST_PREFIX
#      because the laptop serves the real apex + tenant hostnames once
#      Cloudflare Tunnel lands in 18b.3.
#   2. The web port is bound to 127.0.0.1 only — external access is
#      provided by Cloudflare Tunnel (18b.3), not a host-published port.
#   3. Bind mounts live under /srv/sites/klinika-health/ (postgres_data,
#      storage) so backups can `tar` the host directory directly.
#
# Image refs point at ghcr.io/ihox/klinika-*:donetamed — built and
# pushed by .github/workflows/deploy-donetamed.yml on every green CI
# run against the donetamed branch. The matching sha-tagged variant
# (`:donetamed-<sha>`) is pushed in parallel for rollback.
#
# Operational guide: infra/DONETAMED.md

name: klinika-donetamed

services:
  postgres:
    image: postgres:16-alpine
    container_name: klinika-donetamed-postgres
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      PGTZ: Europe/Belgrade
      POSTGRES_DB: ${POSTGRES_DB:-klinika}
      POSTGRES_USER: ${POSTGRES_USER:-klinika}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /srv/sites/klinika-health/postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # No host port mapping — only the api reaches it via the internal
    # network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klinika} -d ${POSTGRES_DB:-klinika}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/ihox/klinika-api:donetamed
    container_name: klinika-donetamed-api
    restart: unless-stopped
    env_file: /srv/sites/klinika-health/.env
    environment:
      TZ: Europe/Belgrade
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-klinika}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-klinika}?schema=public
      STORAGE_ROOT: /workspace/storage
    volumes:
      - /srv/sites/klinika-health/storage:/workspace/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - public
      - dicom
    # No host port mapping — only the web container reaches it via the
    # public network.

  web:
    image: ghcr.io/ihox/klinika-web:donetamed
    container_name: klinika-donetamed-web
    restart: unless-stopped
    env_file: /srv/sites/klinika-health/.env
    environment:
      TZ: Europe/Belgrade
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
    depends_on:
      - api
    networks:
      - public
    ports:
      # Localhost-only. Cloudflare Tunnel (18b.3) terminates externally
      # and forwards to 127.0.0.1:8003 on the same host.
      - "127.0.0.1:8003:3000"

  # ------------------------------------------------------------------
  # Orthanc — DICOM PACS for the clinic's ultrasound machine.
  # Slice 18b.5. Backed by a dedicated Postgres (separate from the
  # Klinika app DB) holding the SQL metadata index; DICOM bytes
  # themselves stay on the filesystem under
  # /srv/sites/klinika-health/orthanc/storage so backups can tar them
  # directly without dumping multi-GB blobs through Postgres.
  #
  # Orthanc REST API (port 8042) is NOT exposed to the host — only the
  # klinika-donetamed-api container reaches it via the `dicom` network.
  # DICOM C-STORE (port 4242) is published on all interfaces; UFW
  # restricts it to RFC1918 sources (clinic LAN only).
  # ------------------------------------------------------------------
  orthanc-postgres:
    image: postgres:16-alpine
    container_name: klinika-donetamed-orthanc-postgres
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      PGTZ: Europe/Belgrade
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: ${ORTHANC_POSTGRES_PASSWORD}
    volumes:
      - /srv/sites/klinika-health/orthanc/postgres_data:/var/lib/postgresql/data
    networks:
      - dicom
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc -d orthanc"]
      interval: 10s
      timeout: 5s
      retries: 10

  orthanc:
    image: orthancteam/orthanc:26.4.2
    container_name: klinika-donetamed-orthanc
    restart: unless-stopped
    environment:
      TZ: Europe/Belgrade
      # Orthanc reads ORTHANC__<JSON_KEY> env vars and merges them into
      # /tmp/orthanc.json at boot. Authoritative env-var docs:
      # https://orthanc.uclouvain.be/book/users/docker.html#environment-variables
      ORTHANC__NAME: "DonetaMED"
      # DICOM AET is hard-capped at 16 chars per DICOM PS3.5 §6.2.
      # "DONETAMED" leaves headroom for future suffixes if needed.
      ORTHANC__DICOM_AET: "DONETAMED"
      ORTHANC__DICOM_PORT: "4242"
      # Authentication off — Orthanc REST never leaves the docker
      # `dicom` network. DICOM port 4242 is reachable on the clinic LAN
      # but DICOM is its own auth (calling-AET allowlist; today we
      # accept any AET, to be tightened at cutover).
      ORTHANC__AUTHENTICATION_ENABLED: "false"
      ORTHANC__REMOTE_ACCESS_ALLOWED: "true"
      # Postgres backend — INDEX in Postgres for transactional safety,
      # raw DICOM bytes on the filesystem (vs putting hundreds of GB
      # of blobs in the SQL DB). See infra/DONETAMED.md § 18b.5.
      #
      # Env var naming is ORTHANC__<JSON_KEY>__<SUB_KEY> per the
      # orthancteam/orthanc image's /startup/generateConfiguration.py
      # which walks os.environ for ORTHANC__-prefixed keys. The
      # PostgreSQL plugin auto-enables when its config keys are set.
      ORTHANC__POSTGRESQL__HOST: orthanc-postgres
      ORTHANC__POSTGRESQL__PORT: "5432"
      ORTHANC__POSTGRESQL__DATABASE: orthanc
      ORTHANC__POSTGRESQL__USERNAME: orthanc
      ORTHANC__POSTGRESQL__PASSWORD: ${ORTHANC_POSTGRES_PASSWORD}
      ORTHANC__POSTGRESQL__ENABLE_INDEX: "true"
      ORTHANC__POSTGRESQL__ENABLE_STORAGE: "false"
      # Lua hook — OnStoredInstance posts a webhook to Klinika's API
      # for every received DICOM instance so the bridge can index
      # studies in dicom_studies. setConfig parses the value via
      # json.loads first, so an env-encoded JSON array works.
      # See infra/compose/orthanc/on-stored.lua + DONETAMED.md §
      # On-stored webhook flow.
      ORTHANC__LUA_SCRIPTS: '["/etc/orthanc/lua-scripts/on-stored.lua"]'
      # Read by the Lua hook via `os.getenv`. NOT processed by
      # orthancteam's configurator (no ORTHANC__ prefix); just lives
      # in the container env. The endpoint is on the internal `dicom`
      # docker network; the Host header in the Lua hook is what lets
      # Klinika's ClinicResolutionMiddleware resolve the tenant.
      ORTHANC_WEBHOOK_URL: http://api:3001/api/dicom/internal/orthanc-event
      # Passthrough of the laptop .env value. Even though the env var
      # name ends in _SECRET (which the configurator interprets as a
      # docker-secrets file-path mapping), the file-path-load only
      # fires for paths actually present under /run/secrets/, so the
      # configurator emits one info-level log line and otherwise
      # ignores it. Lua's os.getenv still returns the real value.
      ORTHANC_WEBHOOK_SECRET: ${ORTHANC_WEBHOOK_SECRET}
    volumes:
      - /srv/sites/klinika-health/orthanc/storage:/var/lib/orthanc/db
      - ./orthanc/on-stored.lua:/etc/orthanc/lua-scripts/on-stored.lua:ro
    networks:
      - dicom
    ports:
      # DICOM C-STORE — published on all host interfaces. UFW restricts
      # source addresses to RFC1918 (clinic LAN). REST port 8042 is
      # deliberately NOT published.
      - "0.0.0.0:4242:4242"
    depends_on:
      orthanc-postgres:
        condition: service_healthy

networks:
  internal:
    name: klinika-donetamed-internal
    driver: bridge
  public:
    name: klinika-donetamed-public
    driver: bridge
  dicom:
    name: klinika-donetamed-dicom
    driver: bridge
