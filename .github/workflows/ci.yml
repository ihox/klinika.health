name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Europe/Belgrade
  # The CI box has no `api` service. Use the `disabled` sentinel that
  # next.config.mjs honours by skipping the /api/* and /health/*
  # rewrites entirely, so unmocked requests 404 from the dev server
  # instead of looping on DNS retries to the docker-compose hostname
  # and flooding logs with EAI_AGAIN unhandledRejections.
  API_INTERNAL_URL: disabled

jobs:
  build:
    name: install, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma client
        run: pnpm --filter @klinika/api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter @klinika/web exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm --filter @klinika/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
