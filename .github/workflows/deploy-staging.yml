name: Deploy Staging

# Mirrors the tregu-online / montelgo pattern (ADR-018):
#   1. CI builds the api + web images and pushes them to GHCR.
#   2. CI SSHes to the staging VM as `deploy` and triggers the
#      restricted dispatcher (/usr/local/bin/deploy.sh klinika-health),
#      which `compose pulls`, runs prisma migrate deploy, and brings
#      the stack up.
#
# The deploy keypair on the VM has `command="/usr/local/bin/deploy.sh"`
# in authorized_keys, so the SSH command argument (`klinika-health`)
# is the slug — that's the entire payload this workflow ships.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'design-reference/prototype/**'
      - 'tools/migrate/**'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build images + trigger VM deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: ${{ vars.STAGING_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api image (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.api.prod
          push: true
          tags: |
            ghcr.io/ihox/klinika-api:staging
            ghcr.io/ihox/klinika-api:staging-${{ github.sha }}
          cache-from: type=gha,scope=klinika-api
          cache-to: type=gha,mode=max,scope=klinika-api

      - name: Build & push web image (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.web.prod
          push: true
          tags: |
            ghcr.io/ihox/klinika-web:staging
            ghcr.io/ihox/klinika-web:staging-${{ github.sha }}
          cache-from: type=gha,scope=klinika-web
          cache-to: type=gha,mode=max,scope=klinika-web

      - name: Trigger deploy on staging-vm
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new \
              -p 101 \
              -i ~/.ssh/deploy_key \
              deploy@80.108.9.40 \
              klinika-health

      # End-to-end health check via the public URL — exercises DNS →
      # sibling NPM → web container → Next.js rewrite → api → postgres.
      - name: Health check
        env:
          STAGING_PUBLIC_URL: ${{ vars.STAGING_PUBLIC_URL }}
        run: |
          set -e
          if [ -z "$STAGING_PUBLIC_URL" ]; then
            echo "STAGING_PUBLIC_URL repo variable is not set; skipping HTTPS check."
            exit 0
          fi
          for attempt in $(seq 1 10); do
            if curl -fsS -m 10 "$STAGING_PUBLIC_URL/health/ready" > /tmp/health.json; then
              echo "✓ Staging health check passed:"
              cat /tmp/health.json
              exit 0
            fi
            echo "  attempt $attempt failed, retrying in 6s…"
            sleep 6
          done
          echo "✗ Staging health check failed after 10 attempts"
          exit 1
